services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: geneinator-postgres
    environment:
      POSTGRES_DB: geneinator
      POSTGRES_USER: geneinator
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geneinator_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geneinator"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: geneinator-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geneinator-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-geneinator_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-that-should-be-at-least-256-bits-long}
      STORAGE_PATH: /data/geneinator
    volumes:
      - storage_data:/data/geneinator
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Image Processing Worker
  image-worker:
    build:
      context: ./image-worker
      dockerfile: Dockerfile
    container_name: geneinator-image-worker
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-geneinator_dev}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      STORAGE_PATH: /data/geneinator
    volumes:
      - storage_data:/data/geneinator
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geneinator-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: geneinator-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - storage_data:/data/geneinator:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  rabbitmq_data:
  storage_data:
