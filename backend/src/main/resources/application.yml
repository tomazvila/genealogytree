spring:
  application:
    name: geneinator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-that-should-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  cookie:
    secure: false

  storage:
    base-path: ${STORAGE_PATH:./data/geneinator}
    originals-dir: originals
    thumbnails-dir: thumbnails

  visibility:
    default-spouse-family-visible: true
    default-max-relationship-hops: 3
    default-include-marriage-connections: true

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/geneinator
    username: geneinator
    password: ${DB_PASSWORD:geneinator_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    com.geneinator: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/geneinator
    username: geneinator
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  cookie:
    secure: true
  cors:
    allowed-origins: ${CORS_ORIGINS:https://medis.tomazvi.la}

logging:
  level:
    com.geneinator: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672

logging:
  level:
    com.geneinator: DEBUG
